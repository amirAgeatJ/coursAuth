<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batcave — Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }

    .logo {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 1.8rem;
      color: #ccc;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.3rem;
    }

    input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #f0c040;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.8rem;
      background: #f0c040;
      color: #0d0d0d;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #ffd966;
    }

    .register-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: #888;
    }

    .register-link a {
      color: #f0c040;
      text-decoration: none;
    }

    #loginMsg { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #ef5350; min-height: 1em; }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #555;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 1.5rem 0 1rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #333;
    }

    .divider:not(:empty)::before { margin-right: 0.75em; }
    .divider:not(:empty)::after { margin-left: 0.75em; }

    .oauth-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.65rem 1rem;
      border-radius: 4px;
      border: 1px solid #444;
      background: #111;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s;
    }

    .oauth-btn:hover { background: #1e1e1e; border-color: #666; }

    .oauth-btn.google:hover { border-color: #4285F4; }
    .oauth-btn.github:hover { border-color: #ffffff; }
    .oauth-btn.discord:hover { border-color: #5865F2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦇</div>
    <h1>Bat-Ordinateur</h1>

    <form id="credentialsForm">
      <label for="username">Identifiant</label>
      <input type="text" id="username" name="username" required autocomplete="username" />

      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />

      <button type="submit">Accéder à la Batcave</button>
    </form>

    <form id="totpForm" style="display: none;">
      <label for="totpCode">Code TOTP (6 chiffres)</label>
      <input type="text" id="totpCode" name="totpCode" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autocomplete="one-time-code" />

      <button type="submit">Valider</button>
    </form>

    <p id="loginMsg"></p>

    <div class="divider">ou</div>

    <div class="oauth-buttons">
      <a class="oauth-btn google" href="/auth/google">Se connecter avec Google</a>
      <a class="oauth-btn github" href="/auth/github">Se connecter avec GitHub</a>
      <a class="oauth-btn discord" href="/auth/discord">Se connecter avec Discord</a>
    </div>

    <p class="register-link">
      Pas encore inscrit ? <a href="/register.html">Créer un compte</a>
    </p>
  </div>

  <script src="/login.js"></script>
</body>
</html>
