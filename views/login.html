<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batcave — Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }

    .logo {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 1.8rem;
      color: #ccc;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.3rem;
    }

    input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #f0c040;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.8rem;
      background: #f0c040;
      color: #0d0d0d;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #ffd966;
    }

    .register-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: #888;
    }

    .register-link a {
      color: #f0c040;
      text-decoration: none;
    }

    #loginMsg { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #ef5350; min-height: 1em; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦇</div>
    <h1>Bat-Ordinateur</h1>

    <form id="credentialsForm">
      <label for="username">Identifiant</label>
      <input type="text" id="username" name="username" required autocomplete="username" />

      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />

      <button type="submit">Accéder à la Batcave</button>
    </form>

    <form id="totpForm" style="display: none;">
      <label for="totpCode">Code TOTP (6 chiffres)</label>
      <input type="text" id="totpCode" name="totpCode" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autocomplete="one-time-code" />

      <button type="submit">Valider</button>
    </form>

    <p id="loginMsg"></p>

    <p class="register-link">
      Pas encore inscrit ? <a href="/register.html">Créer un compte</a>
    </p>
  </div>

  <script src="/login.js"></script>
</body>
</html>
