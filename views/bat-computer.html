<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bat-Ordinateur — Tableau de bord</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    header h1 { font-size: 1.5rem; color: #f0c040; }

    .logout-btn {
      background: #333;
      color: #f0c040;
      border: 1px solid #555;
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .logout-btn:hover { background: #444; }

    #welcome {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #ccc;
    }

    h2 {
      font-size: 1rem;
      color: #f0c040;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    #arsenal {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .gadget {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 1rem;
    }

    .gadget strong { display: block; margin-bottom: 0.3rem; color: #f0c040; }

    textarea {
      width: 100%;
      height: 100px;
      background: #111;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      padding: 0.7rem;
      font-size: 0.95rem;
      resize: vertical;
      margin-bottom: 0.7rem;
    }

    button {
      background: #f0c040;
      color: #0d0d0d;
      font-weight: 700;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover { background: #ffd966; }

    #reportMsg { margin-top: 0.7rem; font-size: 0.9rem; color: #aaa; }
  </style>
</head>
<body>
  <header>
    <h1>🦇 Bat-Ordinateur</h1>
    <a href="/auth/logout" class="logout-btn">Déconnexion</a>
  </header>

  <p id="welcome">Chargement...</p>

  <h2>Arsenal</h2>
  <div id="arsenal"></div>

  <h2>Rapport de mission</h2>
  <textarea id="reportContent" placeholder="Détails de la mission..."></textarea><br/>
  <button id="sendReport">Envoyer le rapport</button>
  <p id="reportMsg"></p>

  <script>
    fetch('/bat-computer/api/me')
      .then(res => {
        if (!res.ok) { window.location.href = '/auth/login'; return; }
        return res.json();
      })
      .then(data => {
        if (data) {
          document.getElementById('welcome').textContent =
            'Bienvenue, Justicier ' + data.username + ' — la Batcave vous attend.';
        }
      });

    fetch('/bat-computer/api/secrets')
      .then(res => res.json())
      .then(gadgets => {
        const container = document.getElementById('arsenal');
        gadgets.forEach(g => {
          const div = document.createElement('div');
          div.className = 'gadget';
          div.innerHTML = `<strong>${g.name}</strong>${g.desc}`;
          container.appendChild(div);
        });
      });

    document.getElementById('sendReport').addEventListener('click', async () => {
      const content = document.getElementById('reportContent').value;
      const res = await fetch('/bat-computer/api/reports', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });
      const data = await res.json();
      document.getElementById('reportMsg').textContent = data.message || data.error;
    });
  </script>
</body>
</html>
