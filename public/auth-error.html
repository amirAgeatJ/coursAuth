<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batcave — Échec de connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }

    .logo { font-size: 3rem; margin-bottom: 0.5rem; }

    h1 { font-size: 1.3rem; color: #ef5350; margin-bottom: 1rem; }

    p { color: #aaa; font-size: 0.95rem; margin-bottom: 1.5rem; }

    a {
      display: inline-block;
      padding: 0.7rem 1.4rem;
      background: #f0c040;
      color: #0d0d0d;
      font-weight: 700;
      border-radius: 4px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦇</div>
    <h1>La connexion a échoué</h1>
    <p id="reasonText">Une erreur est survenue pendant l'authentification.</p>
    <a href="/auth/login">Retour à la connexion</a>
  </div>

  <script src="/auth-error.js"></script>
</body>
</html>
