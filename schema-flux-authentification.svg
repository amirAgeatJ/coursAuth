<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1010" viewBox="0 0 1360 1010" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowSolid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e0e0e0" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4caf50" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef5350" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1360" height="1010" fill="#0d0d0d" />

  <text x="680" y="34" text-anchor="middle" fill="#f0c040" font-size="22" font-weight="700" letter-spacing="1">
    Batcave — Cycle de vie accessToken / refreshToken (JWT)
  </text>

  <!-- Lifelines -->
  <g font-size="14" font-weight="700" fill="#0d0d0d">
    <rect x="50"  y="55" width="200" height="40" rx="6" fill="#f0c040"/>
    <text x="150" y="80" text-anchor="middle">Navigateur / Frontend</text>

    <rect x="440" y="55" width="200" height="40" rx="6" fill="#64b5f6"/>
    <text x="540" y="80" text-anchor="middle">Middleware checkJWT()</text>

    <rect x="810" y="55" width="220" height="40" rx="6" fill="#f0c040"/>
    <text x="920" y="80" text-anchor="middle">API / Serveur Express</text>

    <rect x="1190" y="55" width="160" height="40" rx="6" fill="#4caf50"/>
    <text x="1270" y="80" text-anchor="middle" fill="#0d0d0d">SQLite</text>
  </g>

  <line x1="150"  y1="95" x2="150"  y2="985" stroke="#444" stroke-width="2"/>
  <line x1="540"  y1="95" x2="540"  y2="985" stroke="#444" stroke-width="2"/>
  <line x1="920"  y1="95" x2="920"  y2="985" stroke="#444" stroke-width="2"/>
  <line x1="1270" y1="95" x2="1270" y2="985" stroke="#444" stroke-width="2"/>

  <!-- Section 1 : Login -->
  <text x="20" y="122" fill="#f0c040" font-size="13" font-weight="700">① CONNEXION</text>
  <line x1="10" y1="130" x2="1350" y2="130" stroke="#333" stroke-dasharray="4 4"/>

  <line x1="150" y1="160" x2="920" y2="160" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="530" y="152" text-anchor="middle" fill="#e0e0e0" font-size="12.5">POST /login { username, password }</text>

  <line x1="920" y1="190" x2="1270" y2="190" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="1090" y="182" text-anchor="middle" fill="#e0e0e0" font-size="12">SELECT user + bcrypt.compare()</text>

  <line x1="920" y1="220" x2="1270" y2="220" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="1090" y="212" text-anchor="middle" fill="#e0e0e0" font-size="12">INSERT INTO refresh_tokens (token, expires_at)</text>

  <line x1="1270" y1="248" x2="920" y2="248" stroke="#8fd18f" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="1090" y="242" text-anchor="middle" fill="#8fd18f" font-size="12">OK</text>

  <line x1="920" y1="285" x2="150" y2="285" stroke="#4caf50" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="535" y="272" text-anchor="middle" fill="#4caf50" font-size="12.5" font-weight="700">
    200 OK — Set-Cookie: token (accessToken JWT, 15s)
  </text>
  <text x="535" y="288" text-anchor="middle" fill="#4caf50" font-size="12.5" font-weight="700">
    + Set-Cookie: refreshToken (opaque, 7 jours)
  </text>

  <!-- Section 2 : Expiration -->
  <text x="20" y="330" fill="#f0c040" font-size="13" font-weight="700">② EXPIRATION DE L'ACCESSTOKEN (15 SECONDES PLUS TARD)</text>
  <line x1="10" y1="338" x2="1350" y2="338" stroke="#333" stroke-dasharray="4 4"/>

  <line x1="150" y1="370" x2="540" y2="370" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="345" y="362" text-anchor="middle" fill="#e0e0e0" font-size="12.5">GET /bat-computer/api/me (cookie token expiré)</text>

  <rect x="440" y="392" width="200" height="34" rx="5" fill="#1a1a1a" stroke="#64b5f6"/>
  <text x="540" y="413" text-anchor="middle" fill="#64b5f6" font-size="12">jwt.verify() → TokenExpiredError</text>

  <line x1="540" y1="450" x2="150" y2="450" stroke="#ef5350" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowRed)"/>
  <text x="345" y="442" text-anchor="middle" fill="#ef5350" font-size="12.5" font-weight="700">401 Unauthorized</text>

  <!-- Section 3 : Refresh -->
  <text x="20" y="492" fill="#f0c040" font-size="13" font-weight="700">③ RAFRAÎCHISSEMENT AUTOMATIQUE EN ARRIÈRE-PLAN</text>
  <line x1="10" y1="500" x2="1350" y2="500" stroke="#333" stroke-dasharray="4 4"/>

  <line x1="150" y1="530" x2="920" y2="530" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="535" y="522" text-anchor="middle" fill="#e0e0e0" font-size="12.5">POST /api/auth/refresh (cookie refreshToken)</text>

  <line x1="920" y1="560" x2="1270" y2="560" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="1090" y="552" text-anchor="middle" fill="#e0e0e0" font-size="12">SELECT * FROM refresh_tokens WHERE token = ?</text>

  <line x1="1270" y1="588" x2="920" y2="588" stroke="#8fd18f" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="1090" y="581" text-anchor="middle" fill="#8fd18f" font-size="12">ligne valide (non expirée, used = 0)</text>

  <line x1="920" y1="618" x2="1270" y2="618" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="1090" y="610" text-anchor="middle" fill="#e0e0e0" font-size="11.5">UPDATE used = 1 (ancien) + INSERT nouveau refreshToken</text>

  <line x1="920" y1="655" x2="150" y2="655" stroke="#4caf50" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="535" y="642" text-anchor="middle" fill="#4caf50" font-size="12.5" font-weight="700">
    200 OK — nouveau cookie token (15s)
  </text>
  <text x="535" y="658" text-anchor="middle" fill="#4caf50" font-size="12.5" font-weight="700">
    + nouveau cookie refreshToken (rotation)
  </text>

  <!-- Section 4 : Rejeu -->
  <text x="20" y="700" fill="#f0c040" font-size="13" font-weight="700">④ REJEU TRANSPARENT DE LA REQUÊTE INITIALE</text>
  <line x1="10" y1="708" x2="1350" y2="708" stroke="#333" stroke-dasharray="4 4"/>

  <line x1="150" y1="738" x2="540" y2="738" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="345" y="730" text-anchor="middle" fill="#e0e0e0" font-size="12.5">GET /bat-computer/api/me (nouveau cookie token)</text>

  <rect x="440" y="760" width="200" height="34" rx="5" fill="#1a1a1a" stroke="#64b5f6"/>
  <text x="540" y="781" text-anchor="middle" fill="#64b5f6" font-size="12">jwt.verify() → OK, req.user = {...}</text>

  <line x1="540" y1="815" x2="920" y2="815" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="730" y="807" text-anchor="middle" fill="#e0e0e0" font-size="12.5">next() → route protégée</text>

  <line x1="920" y1="850" x2="150" y2="850" stroke="#4caf50" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="535" y="842" text-anchor="middle" fill="#4caf50" font-size="12.5" font-weight="700">
    200 OK — données utilisateur (aucune déconnexion visible)
  </text>

  <!-- Legend -->
  <rect x="30" y="905" width="1300" height="85" rx="8" fill="#1a1a1a" stroke="#333"/>
  <text x="50" y="930" fill="#ccc" font-size="12.5" font-weight="700">public/dashboard.js — fonction apiFetch() :</text>
  <text x="50" y="952" fill="#aaa" font-size="12">
    1) fetch(url) — 2) si 401 : POST /api/auth/refresh en tâche de fond — 3) si succès : rejeu de fetch(url) — sinon : redirection vers /auth/login
  </text>
  <text x="50" y="975" fill="#666" font-size="11">
    TP3 — Le système de jetons de la Batcave — Alfred &amp; Batman, protocole accessToken (JWT, 15s) / refreshToken (opaque, 7 jours, rotation en BDD)
  </text>
</svg>
